# This is a basic workflow to help you get started with Actions

name: Styleguidist deploy

# Controls when the workflow will run
on:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      port:
        description: 'Порт, на котором будет развернут Styleguide'
        required: true
        type: string

      containerName:
        type: choice
        description: 'Docker image'
        required: true
        options:
          - styleguidist-7.0.0

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: Build

    runs-on: ubuntu-latest

    steps:
      - name: executing remote ssh commands using password
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TRIPLEX_DEV_HOST }}
          username: ${{ secrets.TRIPLEX_DEV_SSH_USER }}
          password: ${{ secrets.TRIPLEX_DEV_SSH_USER_PASS }}
          script: |
            echo "port is ${{ github.event.inputs.port }}"
            echo "containerName is ${{ github.event.inputs.containerName }}"
